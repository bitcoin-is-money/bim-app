# Usage:
#   docker compose up -d postgres          # DB only (for local dev with npm run dev)
#   docker compose up -d                   # All services (full stack via Docker)

services:
  postgres:
    image: postgres:16
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: bim_user
      POSTGRES_PASSWORD: bim_password
      POSTGRES_DB: bim
    command: >
      postgres
      -c ssl=on
      -c ssl_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
      -c ssl_key_file=/etc/ssl/private/ssl-cert-snakeoil.key
    volumes:
      - ./data/${NETWORK:-testnet}/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bim_user -d bim"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: bim-api
    ports:
      - "8080:8080"
    environment:
      NETWORK: ${NETWORK:-testnet}
      DATABASE_URL: postgresql://bim_user:bim_password@postgres:5432/bim
      DATABASE_SSL: require
    env_file:
      - apps/api/.env.${NETWORK:-testnet}.secret
    depends_on:
      postgres:
        condition: service_healthy

  indexer:
    image: bim-indexer
    environment:
      PRESET: ${NETWORK:-testnet}
      APIBARA_RUNTIME_CONFIG: '{"connectionString":"postgresql://bim_user:bim_password@postgres:5432/bim"}'
    env_file:
      - apps/indexer/.env.${NETWORK:-testnet}.secret
    depends_on:
      postgres:
        condition: service_healthy
