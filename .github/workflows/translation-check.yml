name: Translation Check

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'src/**/*.svelte'
      - 'src/**/*.ts'
      - 'src/**/*.js'
      - 'src/lib/i18n/**/*.json'

jobs:
  check-translations:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history for diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Configure GitHub Package Registry authentication
        run: |
          echo "registry=https://registry.npmjs.org" > .npmrc
          echo "" >> .npmrc
          echo "@adrienlacombe:registry=https://npm.pkg.github.com" >> .npmrc
          echo "@atomiqlabs:registry=https://registry.npmjs.org/" >> .npmrc
          echo "@noble:registry=https://registry.npmjs.org/" >> .npmrc
          echo "@scure:registry=https://registry.npmjs.org/" >> .npmrc
          echo "@abi-wan-kanabi:registry=https://registry.npmjs.org/" >> .npmrc
          echo "" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.PACKAGES_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for missing translations
        id: translation_check
        run: |
          echo "🔍 Running comprehensive translation check..."

          # Run the Node.js translation check script and capture output
          set +e  # Don't exit on error
          node scripts/check-translations.js > translation_check_output.txt 2>&1
          CHECK_EXIT_CODE=$?
          set -e  # Resume exit on error

          # Show the output for logging
          echo "Translation check output:"
          cat translation_check_output.txt

          # Check if there are any hardcoded text warnings in the output
          if grep -q "Potential hardcoded text" translation_check_output.txt; then
            echo "::warning::Potential hardcoded text detected"
            echo "has_hardcoded_text=true" >> $GITHUB_OUTPUT
          else
            echo "has_hardcoded_text=false" >> $GITHUB_OUTPUT
          fi

          # Check if translation keys are missing (exit code 1 means keys are missing)
          if [ $CHECK_EXIT_CODE -eq 1 ]; then
            echo "::error::Missing translation keys detected"
            echo "has_missing_keys=true" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "has_missing_keys=false" >> $GITHUB_OUTPUT
            echo "Translation check completed successfully!"
          fi

      - name: Comment PR with results
        if: steps.translation_check.outputs.has_missing_keys == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let output = '';
            try {
              // Try to read the workflow output
              output = fs.readFileSync('${{ github.workspace }}/translation_check_output.txt', 'utf8');
            } catch (error) {
              console.log('No translation check output file found, using default message');
              output = 'Translation check failed. Please check the workflow logs for details.';
            }

            // Comment on the PR
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚫 Translation Check Failed

              This PR has translation issues that need to be addressed.

              ### 📋 What was found:

              ${output.includes('missing translation keys') ? '• **Missing translation keys** - Some $t() calls reference non-existent keys' : ''}
              ${output.includes('Potential hardcoded text') ? '• **Potential hardcoded text** - Some UI text may need internationalization' : ''}

              ### 🔧 What to do:

              1. **Replace hardcoded text** with \`\$t('translation.key')\` calls
              2. **Add missing translation keys** to all locale files
              3. **Ensure all UI text** is properly internationalized

              ### 📚 Example:

              \`\`\`svelte
              <!-- ❌ Don't do this -->
              <h1>Welcome</h1>
              
              <!-- ✅ Do this instead -->
              <h1>{\$t('welcome.title')}</h1>
              \`\`\`

              ### 🔧 Add translations to:

              - \`src/lib/i18n/locales/en/common.json\`
              - \`src/lib/i18n/locales/fr/common.json\`

              ### 📊 Details:

              \`\`\`
              ${output}
              \`\`\`

              ### 📖 Learn more:

              Check the workflow logs above for specific files and line numbers that need attention.

              ---
              *This check ensures all text is properly internationalized for a better user experience.*`
            });
