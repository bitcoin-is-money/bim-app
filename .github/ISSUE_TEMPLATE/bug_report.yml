name: Bug report
description: Report a bug in BIM
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ For security issues, see [SECURITY.md](../blob/main/SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you try to do, and what went wrong?
    validations:
      required: true
