# SonarCloud configuration for the BIM project.
# Documentation: https://docs.sonarsource.com/sonarqube-cloud/

sonar.projectKey=bitcoin-is-money_bim
sonar.organization=bitcoin-is-money

# Disable SonarCloud's Automatic Analysis (CI-driven analysis only,
# avoids a parallel scan running without coverage data).
sonar.autoscan.disabled=true

# Block CI on Quality Gate failure (scanner waits for verdict).
sonar.qualitygate.wait=true

# Source layout
sonar.sources=apps,packages
sonar.tests=apps,packages
sonar.test.inclusions=**/test/**,**/*.test.ts
sonar.exclusions=**/dist/**,**/node_modules/**,**/coverage/**,**/test/**,**/*.test.ts,packages/test-toolkit/src/**

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.base.json

# Disable PL/SQL analyzer (Oracle-specific; the project uses PostgreSQL).
# Empty suffix list prevents the PL/SQL analyzer from claiming any file,
# silencing the "Data Dictionary is not configured" warning.
sonar.plsql.file.suffixes=

# Coverage reports (one lcov per workspace, comma-separated).
# Front coverage path may need adjustment after the first CI run
# (Angular's @angular/build:unit-test builder may emit to a sub-directory).
sonar.javascript.lcov.reportPaths=packages/lib/coverage/lcov.info,packages/domain/coverage/lcov.info,packages/test-toolkit/coverage/lcov.info,packages/atomiq-storage-postgres/coverage/lcov.info,packages/atomiq/coverage/lcov.info,packages/starknet/coverage/lcov.info,packages/slack/coverage/lcov.info,apps/api/coverage/lcov.info,apps/api/coverage-integration/lcov.info,apps/indexer/coverage/lcov.info,apps/front/coverage/frontend/lcov.info

# Coverage exclusions — files that have no test value or are pure infrastructure.
# Rationale per category:
#  - Front: only the model/ layer holds business logic; components/pages/services/mocks
#    are UI wiring covered by manual QA, automated coverage there produces noise.
#  - Adapters (Drizzle repositories, Atomiq/Starknet/Slack gateways): "no test" is the
#    project convention (see .claude/skills/testing-conventions.md) — they are exercised
#    via integration tests of the API.
#  - Bootstrap/entry files (main, entrypoint, load-env, app-startup-health, esbuild
#    configs, *-config.ts): no logic to test, only wiring.
#  - apps/cli: developer tool, not a shipped product.
#  - packages/db: Drizzle schema definitions only.
#  - admin.routes.ts: internal admin endpoints, not part of the public API.
sonar.coverage.exclusions=\
  apps/front/src/app/components/**,\
  apps/front/src/app/pages/**,\
  apps/front/src/app/services/**,\
  apps/front/src/app/mocks/**,\
  apps/front/src/app/interceptor/**,\
  apps/front/src/app/layout/**,\
  apps/front/src/app/pipes/**,\
  apps/front/src/app/app.ts,\
  apps/front/src/app/app.config.ts,\
  apps/front/src/app/app.routes.ts,\
  apps/front/src/main.ts,\
  apps/front/src/icons.ts,\
  apps/front/src/environments/**,\
  apps/api/src/main.ts,\
  apps/api/src/load-env.ts,\
  apps/api/src/app-startup-health.ts,\
  apps/api/src/routes/admin/**,\
  apps/api/src/adapters/persistence/**,\
  apps/api/esbuild.prod.js,\
  apps/indexer/src/entrypoint.ts,\
  apps/indexer/src/indexer-config.ts,\
  apps/indexer/esbuild.prod.js,\
  apps/cli/**,\
  packages/atomiq/src/atomiq.gateway.ts,\
  packages/atomiq/src/index.ts,\
  packages/starknet/src/avnu-paymaster.gateway.ts,\
  packages/starknet/src/avnu-swap.gateway.ts,\
  packages/starknet/src/starknet-rpc.gateway.ts,\
  packages/starknet/src/webauthn-signature.processor.ts,\
  packages/starknet/src/index.ts,\
  packages/slack/src/index.ts,\
  packages/db/**
