<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    @keyframes draw {
      from { stroke-dashoffset: 1; }
      to   { stroke-dashoffset: 0; }
    }
    .check { animation: draw 0.7s cubic-bezier(0.65, 0, 0.35, 1) forwards; }
  </style>
  <path
    class="check"
    pathLength="1"
    d="M20 52 L44 76 L82 28"
    fill="none"
    stroke="#79bc45"
    stroke-width="15"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-dasharray="1 1"
    stroke-dashoffset="1"/>
</svg>
