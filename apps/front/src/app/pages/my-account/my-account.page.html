<app-full-page-layout [showFooter]="true">
  <div class="my-account-page">
    <app-go-back-header [title]="'myAccount.title' | translate"></app-go-back-header>

    <main class="my-account-main">
      @if (!loading() && accountInfo(); as info) {
        <div class="info-list">
          <app-info-field [label]="'myAccount.username' | translate">
            {{ info.username }}
          </app-info-field>
          <app-info-field [label]="'myAccount.starknetAddress' | translate" variant="mono">
            {{ info.starknetAddress ?? '-' }}
          </app-info-field>
          <app-info-field [label]="'myAccount.status' | translate">
            {{ 'myAccount.statusValue.' + info.status | translate }}
          </app-info-field>
          <app-info-field [label]="'myAccount.deploymentTxHash' | translate" variant="mono">
            {{ info.deploymentTxHash ?? '-' }}
          </app-info-field>
          <app-info-field [label]="'myAccount.createdAt' | translate">
            {{ info.createdAt | date:'medium':'':locale() }}
          </app-info-field>
        </div>
      }
    </main>
  </div>
</app-full-page-layout>
