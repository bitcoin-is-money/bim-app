<app-full-page-layout [showFooter]="true">
  <div class="pay-confirm-page">
    <app-go-back-header [title]="'payConfirm.title' | translate"></app-go-back-header>

    <main class="pay-confirm-main">
      @if (payment(); as p) {
        <div class="payment-details">
          <app-network-logo [network]="p.network" style="height:48px"/>
          <app-amount-highlight [originalAmount]="p.amount"/>
          <div class="payment-fields">
            <app-field
              [label]="'payConfirm.to' | translate"
              [title]="p.destination"
              [value]="p.shortDestination"
              [monospace]="true"
            />
            <app-field
              [editable]="true"
              [value]="description()"
              (valueChange)="onDescriptionChange($event)"
            />
            <app-amount-field
              [currencyToggle]="false"
              [amount]="computedFee()"
              [label]="'payConfirm.fee' | translate"
            />
          </div>
          <app-button
            class="confirm-button"
            variant="tertiary"
            [icon]="['fas', 'location-arrow']"
            [loading]="isProcessing()"
            [disabled]="!paymentAvailable() || isProcessing()"
            (click)="confirm()"
          >
            @if (isProcessing()) {
              {{ 'payConfirm.processing' | translate }}
            } @else {
              {{ 'payConfirm.pay' | translate }}
            }
          </app-button>
        </div>

      } @else if (isLoading()) {
        <div class="loading-state">
          <app-spinner />
        </div>
      } @else {
        <p class="no-payment">{{ 'payConfirm.noPaymentData' | translate }}</p>
      }
    </main>
  </div>
</app-full-page-layout>
