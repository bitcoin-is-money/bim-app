<div class="auth-page">
  <header>
    <img src="/logo-baseline.png" alt="Bim_Logo" style="height:48px;"/>
    <h1 class="welcome-message">Pay and receive in Bitcoin. That's it.</h1>
  </header>
  <main>
    <section class="sign-in-section">
      <h2>Sign In</h2>
      <p>Use your device security to access your wallet</p>
      <app-button
        class="sign-in-button"
        variant="primary"
        (click)="onSignIn()"
        [disabled]="authService.isLoading()"
      >
        Sign In
      </app-button>
    </section>
    <div class="divider">
      <span>or create account</span>
    </div>
    <section class="sign-up-section">
      <input
        type="text"
        class="username-input"
        placeholder="Choose your username"
        [value]="username()"
        (input)="updateUsername($event)"
        [disabled]="authService.isLoading()"
      />
      <app-button
        class="sign-up-button"
        variant="secondary"
        (click)="onSignUp()"
        [disabled]="authService.isLoading() || !username()"
      >
        Sign Up
      </app-button>
    </section>
  </main>
  <app-logo-footer />
</div>
