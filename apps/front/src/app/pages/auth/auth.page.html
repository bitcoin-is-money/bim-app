<app-full-page-layout [showFooter]="true">
  <div class="auth-page">
    <header>
      <img src="/logo-baseline.png" alt="bim" class="logo"/>
    </header>

    <main>
      <div class="hero">
        <h1>{{ 'auth.tagline' | translate }}</h1>
        <p class="hero-sub">{{ 'auth.subtagline' | translate }}</p>
      </div>

      <div class="fp-visual" aria-hidden="true">
        <fa-icon [icon]="['fas', 'fingerprint']" class="fp-icon"/>
      </div>
      <p class="fp-hint">{{ 'auth.touchSensor' | translate }}</p>

      <div class="cta-stack">
        <app-button
          colorVariant="gold"
          variant="primary"
          sizeVariant="lg"
          [icon]="['fas', 'fingerprint']"
          [loading]="authService.isLoading()"
          [disabled]="authService.isLoading()"
          (click)="onSignIn()">
          {{ 'auth.signIn' | translate }}
        </app-button>

        <button type="button" class="secondary-link" (click)="openCreateAccount()">
          {{ 'auth.createNewWallet' | translate }}
        </button>
      </div>

      <div class="trust-strip">
        <fa-icon [icon]="['fas', 'shield-halved']"/>
        <div>
          <b>{{ 'auth.trustTitle' | translate }}</b>
          <span>{{ 'auth.trustBody' | translate }}</span>
        </div>
      </div>
    </main>
  </div>
</app-full-page-layout>
<app-pwa-install-banner />
