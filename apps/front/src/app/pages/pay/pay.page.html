<app-full-page-layout [showFooter]="true">
  <div class="pay-page">
    <app-go-back-header [title]="'pay.chooseMethod' | translate"></app-go-back-header>

    <main class="pay-main">
      <app-button
        class="scan-button"
        variant="contrast"
        sizeVariant="xl"
        [icon]="['fas', 'qrcode']"
        (click)="scanQRCode()"
        [disabled]="isLoading()"
      >
        {{ 'pay.scanQr' | translate }}
      </app-button>
      <app-button
        class="parse-clipboard-button"
        variant="contrast"
        sizeVariant="xl"
        [icon]="['fas', 'paste']"
        (click)="pasteFromClipboard()"
        [disabled]="isLoading()"
      >
        {{ 'pay.pasteClipboard' | translate }}
      </app-button>
    </main>

    @if (scanning()) {
      <div class="scanner-overlay">
        <div class="scanner-header">
          <button class="scanner-close" (click)="closeScanner()">✕</button>
        </div>
        <div id="qr-reader" class="qr-reader"></div>
        @if (scannerError(); as error) {
          <div class="scanner-error">
            <p>{{ error }}</p>
            <button class="scanner-retry" (click)="closeScanner()">{{ 'pay.close' | translate }}</button>
          </div>
        }
      </div>
    }
  </div>
</app-full-page-layout>
