<app-full-page-layout [showFooter]="true">
  <div class="receive-page">
    <app-go-back-header [title]="'receive.title' | translate"></app-go-back-header>

    <main class="receive-main">
      <!-- Swipeable zone: logo + dots + QR -->
      <div class="swipe-zone"
           (touchstart)="onTouchStart($event)"
           (touchend)="onTouchEnd($event)">

        <!-- Logo (animated) -->
        <div [class]="'swipe-content ' + animationSlideClass()">
          <app-network-logo [network]="selectedNetwork()" style="height:48px"/>
        </div>

        <!-- Dots (fixed) -->
        <div class="carousel-dots">
          @for (network of networks; track network; let i = $index) {
            <button
              class="dot"
              [class.dot-active]="activeNetworkIndex() === i"
              (click)="scrollToIndex(i)"
              [attr.aria-label]="'receive.goToNetwork' | translate: { network: network }">
            </button>
          }
        </div>

        <!-- QR code (animated) -->
        <div [class]="'swipe-content ' + animationSlideClass()">
          <div class="qr-container">
            @if (qrSvg(); as svg) {
              <div class="qr-image" [innerHTML]="svg"></div>
            } @else {
              <div class="qr-placeholder">
                <p>{{ qrPlaceholderMessage() }}</p>
              </div>
            }
          </div>
        </div>

      </div>

      <!-- Amount & Description -->
      <div class="fields">
        <app-amount-field
          [(amount)]="amount"
          [editable]="true"
          [currencyToggle]="true"/>
        <app-field
          [value]="description()"
          [editable]="true"
          [placeholder]="'receive.optionalDescription' | translate"
          (valueChange)="onDescriptionChange($event)"/>

      </div>
<!--
        @if (selectedNetwork() !== 'lightning') {
          <app-checkbox-field
            [(checked)]="useUriPrefix"
            [label]="'receive.useUriPrefix' | translate"/>
        }
        -->
      <!-- Action buttons -->
      <div class="action-buttons">
        @if (showCreateInvoice()) {
          <app-button
            variant="primary"
            [icon]="['fas', 'qrcode']"
            [disabled]="isCreatingInvoice()"
            [loading]="isCreatingInvoice()"
            (click)="createInvoice()">
            {{ 'receive.createInvoice' | translate }}
          </app-button>
        }
        @if (qrData()) {
          <app-button
            variant="tertiary"
            [icon]="['fas', 'share-nodes']"
            [disabled]="!qrData()"
            (click)="share()">
            {{ 'receive.share' | translate }}
          </app-button>
        }
      </div>
    </main>
  </div>
</app-full-page-layout>
