<app-full-page-layout [showFooter]="false">
  <div class="updating-page">
    <img class="updating-logo" src="/logo-cubes-animated.svg" alt="" />
    @if (showStatus()) {
      <div class="updating-status">
        <h1 class="updating-text">{{ 'pwa.upToDate' | translate }}</h1>
        <img class="updating-check" src="/check-animated.svg" alt="" />
      </div>
    }
  </div>
</app-full-page-layout>
