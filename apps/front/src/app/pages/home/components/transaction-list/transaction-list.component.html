<div class="transaction-list">
  @for (transaction of transactions(); track transaction.id) {
    <div class="transaction-item">
      <div class="transaction-content">
        <div class="transaction-bullet"></div>
        <div class="transaction-info">
          <div class="transaction-label">{{ transaction.type }}</div>
          <div class="transaction-date">{{ transaction.timestamp | date:'short' }}</div>
        </div>
        <div
          class="transaction-amount"
          [class.credit]="transaction.type === 'receive'"
          [class.debit]="transaction.type === 'send'">
          {{ formatAmount(transaction) }}
        </div>
      </div>
    </div>
  }
</div>
