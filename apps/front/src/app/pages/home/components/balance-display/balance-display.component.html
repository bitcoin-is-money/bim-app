<div class="balance-display">
  <div class="balance-amount-container">
    @if (displayedAmount(); as amount) {
      <div class="balance-amount">{{ amount.value | number:'1.2-8' }}</div>
    } @else {
      <div class="balance-amount">-</div>
    }
  </div>
  @if (displayedAmount(); as amount) {
    <app-currency-display
      [currency]="amount.currency"
      size="large"
      (currencyChange)="onCurrencyChange($event)">
    </app-currency-display>
  }
</div>
