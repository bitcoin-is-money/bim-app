<app-full-page-layout [showFooter]="false">
  <div class="home-page">
    <header class="home-header">
      <button class="avatar" (click)="openMyAccount()" [attr.aria-label]="'home.account' | translate">
        {{ initials() }}
      </button>
      <div class="header-actions">
        <button class="icon-btn" (click)="openNotifications()" [attr.aria-label]="'home.notifications' | translate">
          <fa-icon [icon]="['fas', 'bell']"/>
        </button>
        <button class="icon-btn" (click)="openMenu()" [attr.aria-label]="'home.menu' | translate">
          <fa-icon [icon]="['fas', 'ellipsis']"/>
        </button>
      </div>
    </header>

    <main class="home-main">
      <app-amount-highlight [originalAmount]="accountService.balance()" />

      <div class="quick-actions">
        <app-button
          colorVariant="black"
          variant="secondary"
          [compact]="true"
          [icon]="['fas', 'qrcode']"
          (click)="onReceive()">
          {{ 'home.receive' | translate }}
        </app-button>
        <app-button
          colorVariant="gold"
          variant="primary"
          [compact]="true"
          [icon]="['fas', 'paper-plane']"
          (click)="onPay()">
          {{ 'home.pay' | translate }}
        </app-button>
      </div>

      <app-pull-refresh-container
        class="transaction-container"
        [disabled]="transactionService.displayedTransactions() === undefined"
        (refreshRequest)="onRefresh($event)"
        (scroll)="onScroll($event)"
      >
        @if (transactionService.displayedTransactions() === undefined) {
          <div class="loading-more"><app-spinner /></div>
        } @else if (transactionService.isEmpty()) {
          <app-empty-transaction />
        } @else {
          <app-transaction-list [transactions]="transactionService.displayedTransactions()!"></app-transaction-list>
          @if (transactionService.isLoadingMore()) {
            <div class="loading-more"><app-spinner /></div>
          }
        }
      </app-pull-refresh-container>
    </main>
  </div>
</app-full-page-layout>
