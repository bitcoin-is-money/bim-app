<div class="home-page">
  <header class="home-header">
    <div class="header-content">
      <h2 class="greeting">Hi {{ username }}</h2>
      <button
        class="menu-button"
        (click)="openMenu()"
        aria-label="Menu">
        <span class="menu-icon"></span>
        <span class="menu-icon"></span>
        <span class="menu-icon"></span>
      </button>
    </div>
  </header>

  <main class="home-main">
    @if (isLoading()) {
      <div class="loading">Loading...</div>
    } @else {
      <app-balance-display [originalAmount]="balance()!" />
      <section class="transaction-container" (scroll)="onScroll($event)">
        @if (transactionService.transactions() === undefined) {
          <div class="loading-more"><app-spinner /></div>
        } @else if (transactionService.isEmpty()) {
          <app-empty-transaction />
        } @else {
          <app-transaction-list [transactions]="transactionService.transactions()!"></app-transaction-list>
          @if (transactionService.isLoadingMore()) {
            <div class="loading-more"><app-spinner /></div>
          }
        }
      </section>
    }
  </main>

  <footer class="home-footer">
    <button class="footer-button" (click)="onReceive()">
      Receive
    </button>
    <button class="footer-button" (click)="onPay()">
      Pay
    </button>
  </footer>
</div>
