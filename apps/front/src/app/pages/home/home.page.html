<div class="home-page">
  <header class="home-header">
    <div class="header-content">
      <h2 class="greeting">Hi {{ username }}</h2>
      <button
        class="menu-button"
        (click)="openMenu()"
        aria-label="Menu">
        <span class="menu-icon"></span>
        <span class="menu-icon"></span>
        <span class="menu-icon"></span>
      </button>
    </div>
  </header>

  <main class="home-main">
    @if (isLoading()) {
      <div class="loading">Loading...</div>
    } @else {
      <app-balance-display [originalAmount]="balance()!" />
      <section class="transaction-container">
        @if (transactions()!.length === 0) {
          <app-empty-transaction />
        } @else {
          <section class="transactions">
            <app-transaction-list [transactions]="transactions()!"></app-transaction-list>
          </section>
        }
      </section>
    }
  </main>

  <footer class="home-footer">
    <button class="footer-button" (click)="onReceive()">
      Receive
    </button>
    <button class="footer-button" (click)="onPay()">
      Pay
    </button>
  </footer>
</div>
