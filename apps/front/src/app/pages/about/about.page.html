<app-full-page-layout [showFooter]="true">
  <div class="about-page">
    <app-go-back-header [title]="'about.title' | translate"></app-go-back-header>

    <main class="about-main">
      <div class="about-content">
        @if (html(); as rendered) {
          <div class="about-markdown" [innerHTML]="rendered"></div>
        } @else {
          <p class="about-loading">{{ 'common.loading' | translate }}</p>
        }

        <section class="about-install">
          <h2 class="about-install__title">{{ 'about.installation.title' | translate }}</h2>
          <app-pwa-install-info />
          <p class="about-install__version">BIM v{{ version }}</p>
        </section>
      </div>
    </main>
  </div>
</app-full-page-layout>
