<div class="balance-display">
  <div class="balance-amount-container">
    <div class="balance-amount">{{ displayedAmount().value | number:'1.2-8' }}</div>
  </div>
  <app-currency-display
    [currency]="displayedAmount().currency"
    size="large"
    (currencyChange)="onCurrencyChange($event)">
  </app-currency-display>
</div>
