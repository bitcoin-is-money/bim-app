<section class="balance-card">
  <div class="bc-label">{{ labelKey() | translate }}</div>
  @if (displayedAmount(); as amount) {
    <div class="bc-value">
      <span class="bc-big tabular">{{ amount | formatAmount }}</span>
      <span class="bc-ccy">{{ amount.currency }}</span>
    </div>
    @if (fxSecondary(); as fx) {
      <div class="bc-sub mono">≈ {{ fx }}</div>
    }
  } @else {
    <div class="bc-value"><span class="bc-big">—</span></div>
  }
</section>
