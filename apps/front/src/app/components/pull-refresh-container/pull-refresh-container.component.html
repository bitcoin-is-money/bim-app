<app-progress-bar [active]="isRefreshing()" />

<div class="pull-refresh-inner"
  [style.transform]="'translateY(' + pullDistance() + 'px)'"
  [class.snapping]="isSnapping()"
  (touchstart)="onTouchStart($event)"
  (touchmove)="onTouchMove($event)"
  (touchend)="onTouchEnd()">

  <ng-content />
</div>
