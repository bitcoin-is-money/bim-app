<app-field
  [value]="displayValue()"
  [editable]="editable()"
  [inputFilter]="sanitizeNumber"
  [label]="label()"
  [icon]="['fas', 'coins']"
  placeholder="0"
  (valueChange)="onValueChange($event)"
  (focusin)="onFocus($event)"
  (focusout)="onBlur()">

  @if (currencyToggle()) {
    <app-currency-display [currency]="displayCurrency()" />
  } @else {
    <span class="currency-label">{{ amount().currency }}</span>
  }
</app-field>
