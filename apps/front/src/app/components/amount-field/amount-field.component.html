<app-field
  [value]="loading() ? '' : displayValue()"
  [editable]="!loading() && editable()"
  [inputFilter]="sanitizeNumber"
  [label]="label()"
  [icon]="['fas', 'coins']"
  placeholder="0"
  (valueChange)="onValueChange($event)"
  (focusin)="onFocus($event)"
  (focusout)="onBlur()">

  @if (loading()) {
    <app-spinner variant="secondary" class="fee-spinner" />
  }

  @if (currencyToggle()) {
    <app-currency-display [currency]="displayCurrency()" />
  } @else {
    <span class="currency-label">{{ displayCurrency() }}</span>
  }
</app-field>
