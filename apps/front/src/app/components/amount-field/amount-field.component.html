<app-field
  [value]="formattedAmount()"
  [editable]="editable()"
  [label]="label()"
  placeholder="0"
  (valueChange)="onValueChange($event)">

  @if (currencyToggle()) {
    <app-currency-display
      [currency]="amount().currency" />
  } @else {
    <span class="currency-label">{{ amount().currency }}</span>
  }
</app-field>
