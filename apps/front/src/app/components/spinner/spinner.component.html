<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="50" r="40" stroke="#f39c12" stroke-width="8" fill="none"
          stroke-linecap="round" stroke-dasharray="100 251"
          stroke-dashoffset="0">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 50 50"
      to="360 50 50"
      dur="2s"
      repeatCount="indefinite"/>
    <animate attributeName="stroke-dashoffset"
             values="0;251;0"
             dur="2s"
             repeatCount="indefinite"/>
  </circle>
</svg>
