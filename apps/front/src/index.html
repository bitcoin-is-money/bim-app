  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- NOSONAR S5725 - Google Fonts CSS hash is not stable, SRI not applicable; trusted CDN -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; }
    #splash {
      display: flex;
      position: fixed;
      inset: 0;
      background: #000;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      visibility: hidden;
    }
    #splash svg { width: 90vmin; height: 90vmin; max-width: 100%; }
  </style>
  <script>
    (function () {
      const TIMEOUT_MS = 150;
      const pingPromise = fetch('/api/health/live').catch(function () { return null; });
      const ctx = { pingPromise: pingPromise, result: null };
      globalThis.__splashCtx = ctx;

      Promise.race([
        pingPromise.then(function (r) { return r && r.ok ? 'fast' : new Promise(function () {}); }),
        new Promise(function (resolve) { setTimeout(function () { resolve('slow'); }, TIMEOUT_MS); })
      ]).then(function (result) {
        ctx.result = result;
        if (result === 'slow') {
          var splash = document.getElementById('splash');
          if (splash) {
            splash.style.visibility = 'visible';
          }
        }
      });
    })();
  </script>
</head>

  <app-root></app-root>
  <div id="splash">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="-256 -256 1024 1024" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
      <style>
        #splash .cube-left-arc,
        #splash .cube-left-spin,
        #splash .cube-left-tilt,
        #splash .cube-right-slide,
        #splash .cube-right-spin,
        #splash .cube-top-drop,
        #splash .cube-top-tilt,
        #splash .circle-bg {
          animation-duration: 5s;
          animation-iteration-count: 1;
          animation-timing-function: linear;
          animation-fill-mode: both;
        }
        #splash .cube-left-arc    { animation-name: splash-arc-left; }
        #splash .cube-left-spin   { animation-name: splash-spin-left;  transform-box: fill-box; transform-origin: 50% 50%; }
        #splash .cube-left-tilt   { animation-name: splash-tilt-left;  transform-box: fill-box; transform-origin: 100% 100%; }
        #splash .cube-right-slide { animation-name: splash-slide-right; }
        #splash .cube-right-spin  { animation-name: splash-spin-right; transform-box: fill-box; transform-origin: 50% 50%; }
        #splash .cube-top-drop    { animation-name: splash-drop-top; }
        #splash .cube-top-tilt    { animation-name: splash-tilt-top; transform-box: fill-box; transform-origin: 0% 100%; }
        #splash .circle-bg        { animation-name: splash-fade-in-circle; }

        @keyframes splash-fade-in-circle {
          0%    { opacity: 0; }
          68%   { opacity: 0; animation-timing-function: ease-out; }
          74%   { opacity: 1; animation-timing-function: step-end; }
          100%  { opacity: 1; }
        }
        @keyframes splash-arc-left {
          0%     { opacity: 0; transform: translate(-350px, 0); }
          6%     { opacity: 1; }
          15%    { opacity: 1; transform: translate(0, 0); animation-timing-function: step-end; }
          100%   { opacity: 1; transform: translate(0, 0); }
        }
        @keyframes splash-spin-left {
          0%     { transform: rotate(0deg); animation-timing-function: linear; }
          15%    { transform: rotate(180deg); animation-timing-function: step-end; }
          100%   { transform: rotate(180deg); }
        }
        @keyframes splash-tilt-left {
          0%     { transform: rotate(0deg); }
          10%    { transform: rotate(0deg); }
          16%    { transform: rotate(15deg); animation-timing-function: cubic-bezier(0.1, 0, 0.95, 0.1); }
          20%    { transform: rotate(0deg); animation-timing-function: step-end; }
          100%   { transform: rotate(0deg); }
        }
        @keyframes splash-slide-right {
          0%     { opacity: 0; transform: translateX(1500px); animation-timing-function: cubic-bezier(0.1, 0.2, 0.2, 1); }
          21%    { opacity: 0; }
          26%    { opacity: 1; }
          46%    { opacity: 1; transform: translateX(0); animation-timing-function: step-end; }
          100%   { opacity: 1; transform: translateX(0); }
        }
        @keyframes splash-spin-right {
          0%     { transform: rotate(0deg); }
          1%     { transform: rotate(0deg); animation-timing-function: cubic-bezier(0.15, 0.3, 0.25, 1); }
          46%    { transform: rotate(-900deg); animation-timing-function: step-end; }
          100%   { transform: rotate(-900deg); }
        }
        @keyframes splash-drop-top {
          0%     { opacity: 0; transform: translateY(-800px); }
          21%    { opacity: 0; transform: translateY(-800px); animation-timing-function: cubic-bezier(0.5, 0, 0.9, 1); }
          36%    { opacity: 0; }
          41%    { opacity: 1; transform: translateY(0); animation-timing-function: step-end; }
          100%   { opacity: 1; transform: translateY(0); }
        }
        @keyframes splash-tilt-top {
          0%     { transform: rotate(0deg); }
          41%    { transform: rotate(0deg); animation-timing-function: cubic-bezier(0.4, 0, 0.6, 1); }
          46%    { transform: rotate(-7deg); animation-timing-function: cubic-bezier(0.4, 0, 0.6, 1); }
          53.5%  { transform: rotate(0deg); animation-timing-function: step-end; }
          100%   { transform: rotate(0deg); }
        }
      </style>
