<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width" />
		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="manifest" href="/manifest.json" />

		<!-- Buffer polyfill for browser compatibility -->
		<script>
			if (typeof window !== 'undefined' && typeof window.Buffer === 'undefined') {
				window.Buffer = class Buffer {
					constructor(input, encoding, offset) {
						if (typeof input === 'string') {
							this.data = new TextEncoder().encode(input);
						} else if (input instanceof ArrayBuffer) {
							this.data = new Uint8Array(input);
						} else if (Array.isArray(input)) {
							this.data = new Uint8Array(input);
						} else if (input instanceof Uint8Array) {
							this.data = input;
						} else {
							this.data = new Uint8Array(input || 0);
						}
					}

					static from(input, encoding) {
						return new Buffer(input, encoding);
					}

					static alloc(size) {
						return new Buffer(new Uint8Array(size));
					}

					static allocUnsafe(size) {
						return new Buffer(new Uint8Array(size));
					}

					static allocUnsafeSlow(size) {
						return new Buffer(new Uint8Array(size));
					}

					static isBuffer(obj) {
						return obj instanceof Buffer;
					}

					static byteLength(string, encoding) {
						if (typeof string === 'string') {
							return new TextEncoder().encode(string).length;
						}
						return 0;
					}

					static concat(list, totalLength) {
						if (!Array.isArray(list)) {
							throw new TypeError('list argument must be an Array of Buffers');
						}

						if (list.length === 0) {
							return new Buffer(0);
						}

						let total = 0;
						if (totalLength === undefined) {
							for (let i = 0; i < list.length; i++) {
								total += list[i].length;
							}
						} else {
							total = totalLength;
						}

						const result = new Uint8Array(total);
						let offset = 0;
						for (let i = 0; i < list.length && offset < total; i++) {
							const buf = list[i];
							const len = Math.min(buf.length, total - offset);
							result.set(buf.data ? buf.data.slice(0, len) : buf.slice(0, len), offset);
							offset += len;
						}

						return new Buffer(result);
					}

					toString(encoding = 'utf8') {
						if (encoding === 'hex') {
							return Array.from(this.data)
								.map((b) => b.toString(16).padStart(2, '0'))
								.join('');
						}
						return new TextDecoder().decode(this.data);
					}

					get length() {
						return this.data.length;
					}

					get buffer() {
						return this.data.buffer;
					}

					slice(start, end) {
						return new Buffer(this.data.slice(start, end));
					}

					copy(target, targetStart, start, end) {
						const targetData = target instanceof Buffer ? target.data : new Uint8Array(target);
						const targetStartIndex = targetStart || 0;
						const startIndex = start || 0;
						const endIndex = end || this.data.length;

						const copyLength = Math.min(
							endIndex - startIndex,
							targetData.length - targetStartIndex
						);
						targetData.set(this.data.slice(startIndex, startIndex + copyLength), targetStartIndex);

						return copyLength;
					}

					fill(value, start, end) {
						const startIndex = start || 0;
						const endIndex = end || this.data.length;

						if (typeof value === 'number') {
							this.data.fill(value, startIndex, endIndex);
						} else if (typeof value === 'string') {
							const encoder = new TextEncoder();
							const encoded = encoder.encode(value);
							for (let i = startIndex; i < endIndex; i++) {
								this.data[i] = encoded[i % encoded.length];
							}
						}

						return this;
					}

					write(string, offset, length, encoding) {
						const encoder = new TextEncoder();
						const encoded = encoder.encode(string);
						const start = offset || 0;
						const len = length || encoded.length;
						const end = Math.min(start + len, this.data.length);

						for (let i = start; i < end; i++) {
							this.data[i] = encoded[i - start];
						}

						return end - start;
					}

					readUInt8(offset) {
						return this.data[offset];
					}

					readUInt16LE(offset) {
						return this.data[offset] | (this.data[offset + 1] << 8);
					}

					readUInt32LE(offset) {
						return (
							this.data[offset] |
							(this.data[offset + 1] << 8) |
							(this.data[offset + 2] << 16) |
							(this.data[offset + 3] << 24)
						);
					}

					writeUInt8(value, offset) {
						this.data[offset] = value;
					}

					writeUInt16LE(value, offset) {
						this.data[offset] = value & 0xff;
						this.data[offset + 1] = (value >> 8) & 0xff;
					}

					writeUInt32LE(value, offset) {
						this.data[offset] = value & 0xff;
						this.data[offset + 1] = (value >> 8) & 0xff;
						this.data[offset + 2] = (value >> 16) & 0xff;
						this.data[offset + 3] = (value >> 24) & 0xff;
					}
				};
			}
		</script>

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
